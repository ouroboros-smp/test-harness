schemaVersion: 1
id: keepgear/acceptance
title: KeepGear Fabric release-level death, precedence, XP, permission, reload, restart, and copy acceptance
description: The ten deterministic acceptance cases from issue 17, driven through real clients and the harness-only bridge.
issues: [17]
tags: [keepgear, death, inventory, xp, permissions, restart]
artifacts:
  consumer: { required: true, description: Packaged KeepGear Fabric 26.2 server jar }
clients:
  - { name: victim, username: KeepVictim }
  - { name: killer, username: KeepKiller }
server:
  memoryMb: 1536
  reuseWorldOnRestart: true
  allowedLogPatterns:
    - "Failed to load KeepGear config"
    - "^Caused by: java\\.io\\.EOFException: End of input .*path \\$\\.malformed$"
steps:
  - id: configure
    name: Write the packaged-default-equivalent config before startup
    actions:
      - type: file.write
        path: config/keepgear.json
        content:
          keep-slots: [hotbar-1, hotbar-2, hotbar-3, hotbar-4, hotbar-5, helmet, chestplate, leggings, boots, offhand]
          always-drop: [minecraft:elytra, minecraft:trident, minecraft:bundle, minecraft:mace, "#minecraft:shulker_boxes"]
          keep-xp: false
          pvp-only: false
          require-permission: false
          enabled-worlds: []
          verbose: true
      - { type: server.start }
    timeoutSeconds: 260
  - id: default_retention
    name: Retain hotbar 1-5, armor, and offhand while dropping remaining inventory exactly once
    actions:
      - { type: bridge.request, method: PUT, path: /v1/player/inventory, body: { player: KeepVictim, slot: 0, item: minecraft:diamond, count: 1 } }
      - { type: bridge.request, method: PUT, path: /v1/player/inventory, body: { player: KeepVictim, slot: 5, item: minecraft:gold_ingot, count: 2 } }
      - { type: bridge.request, method: POST, path: /v1/player/damage, body: { player: KeepVictim, amount: 1000, type: minecraft:generic } }
      - { type: wait.event, client: victim, event: death, count: 1, timeoutMs: 10000 }
      - { type: client.respawn, client: victim }
      - { type: wait.event, client: victim, event: respawn, count: 1, timeoutMs: 10000 }
      - { type: wait.ticks, ticks: 25 }
    assertions:
      - { type: bridge.json, path: "/v1/player/state?name=KeepVictim", jsonPath: inventory.0.item, expected: minecraft:diamond }
      - { type: bridge.json, path: "/v1/player/state?name=KeepVictim", jsonPath: inventory.5.empty, expected: true }
      - { type: bridge.json, path: "/v1/entities?type=minecraft:item", jsonPath: "0.type", expected: minecraft:item }
  - id: forced_elytra
    name: Force an Elytra to drop from an otherwise retained chestplate slot
    actions:
      - { type: bridge.request, method: PUT, path: /v1/player/inventory, body: { player: KeepVictim, slot: 38, item: minecraft:elytra, count: 1 } }
      - { type: bridge.request, method: POST, path: /v1/player/damage, body: { player: KeepVictim, amount: 1000, type: minecraft:generic } }
      - { type: wait.event, client: victim, event: death, count: 2, timeoutMs: 10000 }
      - { type: client.respawn, client: victim }
      - { type: wait.ticks, ticks: 25 }
    assertions:
      - { type: bridge.json, path: "/v1/player/state?name=KeepVictim", jsonPath: inventory.38.empty, expected: true }
  - id: kinship_bundle
    name: Protect nested Kinship bundle contents against always-drop precedence
    actions:
      - type: bridge.request
        method: PUT
        path: /v1/player/inventory
        body:
          player: KeepVictim
          slot: 10
          item: minecraft:bundle
          count: 1
          bundle:
            - item: minecraft:paper
              count: 1
              customData:
                PublicBukkitValues:
                  "kinship:kinship_item": artifact
      - { type: bridge.request, method: POST, path: /v1/player/damage, body: { player: KeepVictim, amount: 1000, type: minecraft:generic } }
      - { type: wait.event, client: victim, event: death, count: 3, timeoutMs: 10000 }
      - { type: client.respawn, client: victim }
      - { type: wait.ticks, ticks: 25 }
    assertions:
      - { type: bridge.json, path: "/v1/player/state?name=KeepVictim", jsonPath: inventory.10.item, expected: minecraft:bundle }
  - id: keep_inventory
    name: Gamerule keepInventory bypasses all KeepGear mutation without duplication
    actions:
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "gamerule keep_inventory true" } }
      - { type: bridge.request, method: PUT, path: /v1/player/inventory, body: { player: KeepVictim, slot: 6, item: minecraft:emerald, count: 4 } }
      - { type: bridge.request, method: POST, path: /v1/player/damage, body: { player: KeepVictim, amount: 1000, type: minecraft:generic } }
      - { type: wait.event, client: victim, event: death, count: 4, timeoutMs: 10000 }
      - { type: client.respawn, client: victim }
      - { type: wait.ticks, ticks: 25 }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "gamerule keep_inventory false" } }
    assertions:
      - { type: bridge.json, path: "/v1/player/state?name=KeepVictim", jsonPath: inventory.6.count, expected: 4 }
  - id: xp
    name: Keep XP with zero corresponding XP-orb payout
    actions:
      - type: file.write
        path: config/keepgear.json
        content:
          keep-slots: [hotbar-1]
          always-drop: []
          keep-xp: true
          pvp-only: false
          require-permission: false
          enabled-worlds: []
          verbose: true
      - { type: console.command, command: "keepgear reload", waitFor: "KeepGear config reloaded" }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "experience set KeepVictim 17 levels" } }
      - { type: snapshot.capture, name: xp-before, path: "/v1/player/state?name=KeepVictim" }
      - { type: bridge.request, method: POST, path: /v1/player/damage, body: { player: KeepVictim, amount: 1000, type: minecraft:generic } }
      - { type: wait.event, client: victim, event: death, count: 5, timeoutMs: 10000 }
      - { type: client.respawn, client: victim }
      - { type: wait.ticks, ticks: 25 }
      - { type: snapshot.capture, name: xp-after, path: "/v1/player/state?name=KeepVictim" }
    assertions:
      - { type: snapshot.equals, left: xp-before, right: xp-after, path: experienceLevel }
      - { type: bridge.json, path: "/v1/entities?type=minecraft:experience_orb", jsonPath: "0", operator: absent }
  - id: pvp
    name: Contrast pvp-only direct-player death with environment death
    actions:
      - type: file.write
        path: config/keepgear.json
        content:
          keep-slots: [hotbar-1]
          always-drop: []
          keep-xp: false
          pvp-only: true
          require-permission: false
          enabled-worlds: []
          verbose: true
      - { type: console.command, command: "keepgear reload", waitFor: "KeepGear config reloaded" }
      - { type: bridge.request, method: POST, path: /v1/player/damage, body: { player: KeepVictim, amount: 1000, type: minecraft:player_attack, by: KeepKiller } }
      - { type: wait.event, client: victim, event: death, count: 6, timeoutMs: 10000 }
      - { type: client.respawn, client: victim }
      - { type: wait.ticks, ticks: 25 }
      - { type: bridge.request, method: POST, path: /v1/player/damage, body: { player: KeepVictim, amount: 1000, type: minecraft:generic } }
      - { type: wait.event, client: victim, event: death, count: 7, timeoutMs: 10000 }
      - { type: client.respawn, client: victim }
      - { type: wait.ticks, ticks: 25 }
    assertions:
      - { type: log.present, pattern: "pvp|environment|eligibility", count: 1, operator: gte }
  - id: permission
    name: Contrast permission deny and allow using the harness-only provider
    actions:
      - { type: bridge.request, method: POST, path: /v1/permissions, body: { player: KeepVictim, permission: keepgear.keep, decision: deny } }
      - { type: bridge.request, method: POST, path: /v1/permissions, body: { player: KeepVictim, permission: keepgear.keep, decision: allow } }
    assertions:
      - { type: log.absent, pattern: "permission provider.*(?:missing|error)" }
  - id: reload_snapshot
    name: Snapshot death rules across a valid reload and preserve the previous rules after malformed reload
    actions:
      - { type: bridge.request, method: POST, path: /v1/player/damage, body: { player: KeepVictim, amount: 1000, type: minecraft:generic } }
      - { type: file.write, path: config/keepgear.json, content: "{ malformed" }
      - { type: console.command, command: "keepgear reload", waitFor: "KeepGear config reload failed" }
      - { type: client.respawn, client: victim }
      - { type: wait.ticks, ticks: 25 }
      - type: file.write
        path: config/keepgear.json
        content:
          keep-slots: [hotbar-1]
          always-drop: []
          keep-xp: true
          pvp-only: false
          require-permission: false
          enabled-worlds: []
          verbose: true
      - { type: console.command, command: "keepgear reload", waitFor: "KeepGear config reloaded" }
    assertions:
      - { type: log.present, pattern: "KeepGear config reload failed; previous rules remain active" }
  - id: restart_dead
    name: Restart while dead and recover pending inventory/XP on respawn
    timeoutSeconds: 260
    actions:
      - { type: bridge.request, method: POST, path: /v1/player/damage, body: { player: KeepVictim, amount: 1000, type: minecraft:generic } }
      - { type: server.restart, reconnect: true }
      - { type: client.respawn, client: victim }
      - { type: wait.ticks, ticks: 25 }
    assertions:
      - { type: log.absent, pattern: "stale pending|duplicate inventory|pending death.*lost" }
  - id: alive_copy
    name: End/alive-copy lifecycle does not duplicate inventory and the next death works once
    actions:
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute in minecraft:the_end run tp KeepVictim 0 80 0" } }
      - { type: wait.ticks, ticks: 20 }
      - { type: snapshot.capture, name: end-copy, path: "/v1/player/state?name=KeepVictim" }
    assertions:
      - { type: log.absent, pattern: "alive-copy.*duplicate|stale pending snapshot" }
  - id: stop
    name: Clean shutdown with actionable artifacts
    always: true
    actions: [{ type: server.stop }]
