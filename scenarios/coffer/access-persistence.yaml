schemaVersion: 1
id: coffer/access-persistence
title: Coffer two-player access, trust, lock modes, and restart persistence
issues: [19]
tags: [coffer, access, trust, persistence]
artifacts:
  consumer: { required: true, description: Packaged coffer-fabric-server jar }
clients:
  - { name: owner, username: CofferOwner }
  - { name: stranger, username: CofferStranger }
server:
  memoryMb: 1536
  reuseWorldOnRestart: true
steps:
  - id: place
    name: Bind a placed container to the owner's stable UUID
    timeoutSeconds: 260
    actions:
      - { type: server.start }
      - { type: client.command, client: owner, command: "coffer harness place 0 80 0" }
    assertions:
      - { type: bridge.json, path: "/v1/block-entity?x=0&y=80&z=0", jsonPath: snbt, operator: contains, expected: CofferOwner }
  - id: private
    name: Deny the stranger without opening an inventory screen
    actions:
      - { type: client.command, client: stranger, command: "coffer harness use 0 80 0" }
    assertions:
      - { type: client.event, client: stranger, event: message, pattern: "denied|private|locked", count: 1, operator: gte }
  - id: trust_modes
    name: Grant local/global trust and verify public/key lock matches and mismatches
    actions:
      - { type: client.command, client: owner, command: "coffer trust add CofferStranger" }
      - { type: client.command, client: owner, command: "coffer global-trust add CofferStranger" }
      - { type: client.command, client: owner, command: "coffer lock public" }
      - { type: client.command, client: owner, command: "coffer lock key" }
    assertions:
      - { type: log.absent, pattern: "unauthorized mutation|duplicate callback" }
  - id: stranger_admin
    name: Prevent stranger management mutation
    actions:
      - { type: client.command, client: stranger, command: "coffer lock public" }
    assertions:
      - { type: client.event, client: stranger, event: message, pattern: "owner|denied|permission", count: 1, operator: gte }
  - id: restart
    name: Persist owner, lock, local/global trust, key, overrides, and public unbound legacy state
    timeoutSeconds: 260
    actions:
      - { type: snapshot.capture, name: coffer-before, path: "/v1/block-entity?x=0&y=80&z=0" }
      - { type: server.restart, reconnect: true }
      - { type: snapshot.capture, name: coffer-after, path: "/v1/block-entity?x=0&y=80&z=0" }
    assertions:
      - { type: snapshot.equals, left: coffer-before, right: coffer-after, path: snbt }
  - id: stop
    name: Clean shutdown
    always: true
    actions: [{ type: server.stop }]
