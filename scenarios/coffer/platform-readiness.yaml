schemaVersion: 1
id: coffer/platform-readiness
title: Coffer packaged Fabric server lifecycle, two-client, bridge, isolation, and restart readiness
issues: [18]
tags: [coffer, platform, lifecycle, packaging]
artifacts:
  consumer: { required: true, description: Packaged coffer-fabric-server jar }
clients:
  - { name: owner, username: CofferOwner }
  - { name: stranger, username: CofferStranger }
server:
  memoryMb: 1536
  reuseWorldOnRestart: true
steps:
  - id: start
    name: Install the packaged server jar and join two stable real clients
    timeoutSeconds: 260
    actions: [{ type: server.start }]
    assertions:
      - { type: bridge.json, path: /v1/players, jsonPath: "0.name", operator: exists }
      - { type: bridge.json, path: /v1/players, jsonPath: "1.name", operator: exists }
  - id: control
    name: Drive movement, interaction, inventory, chat, and server/player commands
    actions:
      - { type: client.move, client: owner, control: forward, durationMs: 500 }
      - { type: client.chat, client: owner, message: "coffer harness" }
      - { type: bridge.request, method: PUT, path: /v1/player/inventory, body: { player: CofferOwner, slot: 0, item: minecraft:chest, count: 2 } }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "time set day" } }
  - id: restart
    name: Restart the same isolated world with bounded lifecycle timeouts
    timeoutSeconds: 260
    actions: [{ type: server.restart, reconnect: true }]
    assertions:
      - { type: log.absent, pattern: "mixin conflict|initialization-order|watchdog|hang" }
  - id: stop
    name: Clean shutdown with structured bridge/client/server evidence
    always: true
    actions: [{ type: server.stop }]
