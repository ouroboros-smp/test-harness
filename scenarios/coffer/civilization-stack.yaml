        intervalMs: 250
        assertion: { type: client.state, client: member, path: connected, expected: true }
      - type: wait.until
        timeoutMs: 30000
        intervalMs: 250
        assertion: { type: client.state, client: head, path: connected, expected: true }
      - { type: adapter.invoke, adapter: coffer, operation: civilization, args: { relativeTo: CivHead, x: 41, y: 0, z: 0, player: CivMember }, as: restarted-civilization }
      - { type: adapter.invoke, adapter: coffer, operation: inspect-pair, args: { relativeTo: CivHead, x: 41, y: 0, z: 0 }, as: restarted-lock }
      - { type: adapter.invoke, adapter: coffer, operation: inspect-registry, args: { relativeTo: CivHead, x: 41, y: 0, z: 0 }, as: restarted-registry }
      - { type: adapter.invoke, adapter: coffer, operation: can-open, args: { relativeTo: CivHead, x: 41, y: 0, z: 0, player: CivMember }, as: restarted-access }
    assertions:
      - { type: value.json, value: restarted-civilization, jsonPath: principal, operator: contains, expected: "kinship:" }
      - { type: value.json, value: restarted-civilization, jsonPath: structure.owner, operator: contains, expected: "kinship:" }
      - { type: value.json, value: restarted-lock, jsonPath: lock.ownershipMode, expected: premises }
      - { type: value.json, value: restarted-lock, jsonPath: lock.flagOverrides.hoppers, expected: true }
      - { type: value.json, value: restarted-registry, jsonPath: aggregateId, expected: "${continuity-aggregate}" }
      - { type: value.json, value: restarted-registry, jsonPath: revision, expected: "${continuity-post-retry-revision}" }
      - { type: value.json, value: restarted-access, jsonPath: allowed, expected: true }
      - { type: log.absent, pattern: "wrong thread|ConcurrentModificationException" }

  - id: stop
    name: Stop after success or failure
    always: true
    actions:
      - { type: server.stop }
