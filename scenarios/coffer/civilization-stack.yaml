schemaVersion: 1
id: coffer/civilization-stack
title: Coffer, Rooms, and Kinship principal and access interoperability
description: Builds a real Rooms structure owned by a Kinship principal, then proves independent resident and Kinship grants, fail-closed provider faults, personal fallback, selective premises transfer, and restart-safe two-phase continuity with packaged jars and real clients.
issues: [39, 46]
tags: [coffer, rooms, kinship, civilization, multi-client, restart]
variables:
  coffer-version: 0.1.5
artifacts:
  consumer: { required: true, description: Packaged Coffer server jar }
  coffer_adapter: { required: true, description: Harness-only Coffer adapter }
  rooms: { required: true, description: Packaged Rooms Fabric server jar }
  kinship: { required: true, description: Packaged Kinship Fabric server jar }
clients:
  - { name: head, username: CivHead, gameMode: creative }
  - { name: member, username: CivMember, gameMode: creative }
server:
  memoryMb: 2304
  startupTimeoutSeconds: 360
  reuseWorldOnRestart: true
steps:
  - id: start
    name: Start the three packaged mods and establish a Kinship family
    timeoutSeconds: 360
    actions:
      - { type: server.start }
      - { type: console.command, command: "op CivHead" }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run tp CivMember ~10 ~ ~" } }
      - { type: client.command, client: head, command: "kinship union propose CivMember" }
      - type: wait.until
        assertion: { type: client.event, client: head, event: message, pattern: "union|propos" }
      - { type: client.command, client: member, command: "kinship union accept CivHead" }
      - type: wait.until
        assertion: { type: client.event, client: head, event: message, pattern: "accepted your union proposal" }
      - { type: client.command, client: head, command: "kinship union surname Interop" }
      - type: wait.until
        assertion: { type: client.event, client: head, event: message, pattern: "family is now known as Interop" }
    assertions:
      - { type: bridge.json, path: /v1/mods, jsonPath: coffer.version, expected: "${coffer-version}" }
      - { type: bridge.json, path: /v1/mods, jsonPath: rooms.version, expected: 0.3.1 }
      - { type: bridge.json, path: /v1/mods, jsonPath: kinship.version, expected: 0.4.0 }

  - id: structure
    name: Discover a physical Rooms structure attributed to the family principal
    timeoutSeconds: 120
    actions:
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run fill ~-3 ~-1 ~-3 ~3 ~-1 ~3 minecraft:stone" } }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run fill ~-3 ~3 ~-3 ~3 ~3 ~3 minecraft:stone" } }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run fill ~-2 ~ ~-2 ~2 ~2 ~2 minecraft:air" } }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run fill ~-3 ~ ~-3 ~-3 ~2 ~3 minecraft:stone" } }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run fill ~3 ~ ~-3 ~3 ~2 ~3 minecraft:stone" } }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run fill ~-2 ~ ~-3 ~2 ~2 ~-3 minecraft:stone" } }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run fill ~-2 ~ ~3 ~2 ~2 ~3 minecraft:stone" } }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run fill ~-1 ~ ~4 ~1 ~2 ~5 minecraft:air" } }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run setblock ~ ~ ~3 minecraft:air" } }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run setblock ~ ~1 ~3 minecraft:air" } }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run setblock ~1 ~ ~ minecraft:chest" } }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run setblock ~-1 ~ ~1 minecraft:red_bed[part=foot,facing=east,occupied=false]" } }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run setblock ~ ~ ~1 minecraft:red_bed[part=head,facing=east,occupied=false]" } }
      - { type: console.command, command: "item replace entity CivHead hotbar.0 with minecraft:oak_door 1" }
      - type: wait.until
        assertion: { type: client.state, client: head, path: inventory, operator: contains, expected: minecraft:oak_door }
      - { type: client.select_hotbar, client: head, slot: 0 }
      - { type: wait.ticks, ticks: 2 }
      - { type: client.look, client: head, yaw: 0, pitch: 0 }
      - { type: wait.ticks, ticks: 2 }
      - { type: client.place_block, client: head, relative: true, x: 0, y: -1, z: 3 }
      - type: wait.until
        timeoutMs: 45000
        intervalMs: 250
        assertion: { type: sqlite.query, path: config/rooms/rooms.db, sql: "SELECT COUNT(*) AS count FROM rooms", jsonPath: "0.count", operator: gte, expected: 1 }
      - { type: sqlite.query, path: config/rooms/rooms.db, sql: "SELECT status, type_id FROM rooms", as: room-state }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run tp CivHead ~7 ~ ~" } }
      - { type: wait.ticks, ticks: 2 }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run fill ~-3 ~-1 ~-3 ~3 ~-1 ~3 minecraft:stone" } }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run fill ~-3 ~3 ~-3 ~3 ~3 ~3 minecraft:stone" } }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run fill ~-2 ~ ~-2 ~2 ~2 ~2 minecraft:air" } }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run fill ~-3 ~ ~-3 ~-3 ~2 ~3 minecraft:stone" } }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run fill ~3 ~ ~-3 ~3 ~2 ~3 minecraft:stone" } }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run fill ~-2 ~ ~-3 ~2 ~2 ~-3 minecraft:stone" } }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run fill ~-2 ~ ~3 ~2 ~2 ~3 minecraft:stone" } }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run fill ~-1 ~ ~4 ~1 ~2 ~5 minecraft:air" } }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run setblock ~ ~ ~3 minecraft:air" } }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run setblock ~ ~1 ~3 minecraft:air" } }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run setblock ~1 ~ ~ minecraft:chest" } }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run setblock ~-1 ~ ~1 minecraft:red_bed[part=foot,facing=east,occupied=false]" } }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run setblock ~ ~ ~1 minecraft:red_bed[part=head,facing=east,occupied=false]" } }
      - { type: console.command, command: "item replace entity CivHead hotbar.0 with minecraft:oak_door 1" }
      - type: wait.until
        assertion: { type: client.state, client: head, path: inventory, operator: contains, expected: minecraft:oak_door }
      - { type: client.select_hotbar, client: head, slot: 0 }
      - { type: wait.ticks, ticks: 2 }
      - { type: client.look, client: head, yaw: 0, pitch: 0 }
      - { type: wait.ticks, ticks: 2 }
      - { type: client.place_block, client: head, relative: true, x: 0, y: -1, z: 3 }
      - type: wait.until
        timeoutMs: 45000
        intervalMs: 250
        assertion: { type: sqlite.query, path: config/rooms/rooms.db, sql: "SELECT COUNT(*) AS count FROM rooms", jsonPath: "0.count", operator: gte, expected: 2 }
      - type: wait.until
        timeoutMs: 45000
        intervalMs: 250
        assertion: { type: sqlite.query, path: config/rooms/rooms.db, sql: "SELECT COUNT(*) AS count FROM structures", jsonPath: "0.count", operator: gte, expected: 1 }
      - { type: sqlite.query, path: config/rooms/rooms.db, sql: "SELECT id FROM structures ORDER BY id LIMIT 1", as: structure-row }
      - { type: value.extract, value: structure-row, jsonPath: "0.id", as: structure-id }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "tp CivMember CivHead" } }
      - type: wait.until
        timeoutMs: 30000
        intervalMs: 250
        assertion: { type: client.state, client: member, path: connected, expected: true }
      - { type: client.command, client: member, command: "structure claim" }
      - type: wait.until
        timeoutMs: 30000
        intervalMs: 250
        assertion: { type: client.event, client: member, event: message, pattern: "Only a principal administrator can claim" }
      - type: wait.until
        timeoutMs: 30000
        intervalMs: 250
        assertion: { type: sqlite.query, path: config/rooms/rooms.db, sql: "SELECT COUNT(*) AS count FROM structures WHERE id = ? AND COALESCE(owner_id, '') = ''", parameters: ["${structure-id}"], jsonPath: "0.count", expected: 1 }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "tp CivHead CivMember" } }
      - type: wait.until
        timeoutMs: 30000
        intervalMs: 250
        assertion: { type: client.state, client: head, path: connected, expected: true }
      - { type: client.command, client: head, command: "structure claim" }
      - type: wait.until
        timeoutMs: 30000
        intervalMs: 250
        assertion: { type: sqlite.query, path: config/rooms/rooms.db, sql: "SELECT COUNT(*) AS count FROM structures WHERE id = ? AND owner_id LIKE 'kinship:%'", parameters: ["${structure-id}"], jsonPath: "0.count", expected: 1 }
      - { type: adapter.invoke, adapter: coffer, operation: civilization, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, player: CivHead }, as: head-civilization }
      - { type: adapter.invoke, adapter: coffer, operation: civilization, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, player: CivMember }, as: member-civilization }
      - { type: console.command, command: "execute at CivHead run setblock ~-6 ~ ~ minecraft:chest" }
      - type: wait.until
        timeoutMs: 30000
        intervalMs: 250
        assertion: { type: adapter.assert, adapter: coffer, operation: inspect-pair, args: { relativeTo: CivHead, x: -6, y: 0, z: 0 }, jsonPath: pair.0.block, expected: "minecraft:chest" }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run clone ~-10 ~-1 ~-3 ~3 ~3 ~5 ~30 ~-1 ~-3 replace force" } }
      - type: wait.until
        timeoutMs: 30000
        intervalMs: 250
        assertion: { type: adapter.assert, adapter: coffer, operation: inspect-pair, args: { relativeTo: CivHead, x: 41, y: 0, z: 0 }, jsonPath: pair.0.block, expected: "minecraft:chest" }
      - type: wait.until
        timeoutMs: 30000
        intervalMs: 250
        assertion: { type: adapter.assert, adapter: coffer, operation: inspect-pair, args: { relativeTo: CivHead, x: 41, y: 0, z: 0 }, jsonPath: pair.0.bound, expected: false }
      - type: wait.until
        timeoutMs: 30000
        intervalMs: 250
        assertion: { type: adapter.assert, adapter: coffer, operation: inspect-pair, args: { relativeTo: CivHead, x: 34, y: 0, z: 0 }, jsonPath: pair.0.block, expected: "minecraft:chest" }
      - type: wait.until
        timeoutMs: 30000
        intervalMs: 250
        assertion: { type: adapter.assert, adapter: coffer, operation: inspect-pair, args: { relativeTo: CivHead, x: 34, y: 0, z: 0 }, jsonPath: pair.0.bound, expected: false }
    assertions:
      - { type: value.json, value: head-civilization, jsonPath: principal, operator: contains, expected: "kinship:" }
      - { type: value.json, value: head-civilization, jsonPath: structure.owner, operator: contains, expected: "kinship:" }
      - { type: value.json, value: head-civilization, jsonPath: member, expected: true }
      - { type: value.json, value: head-civilization, jsonPath: canAdminister, expected: true }
      - { type: value.json, value: member-civilization, jsonPath: member, expected: true }
      - { type: value.json, value: member-civilization, jsonPath: canAdminister, expected: false }
      - { type: value.json, value: member-civilization, jsonPath: principal, operator: contains, expected: "kinship:" }

  - id: personal
    name: Preserve personal ownership and local trust until group access is explicitly enabled
    actions:
      - { type: adapter.invoke, adapter: coffer, operation: bind, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, type: private, ownerPlayer: CivHead }, as: personal-bind }
      - { type: adapter.invoke, adapter: coffer, operation: can-open, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, player: CivHead }, as: personal-head }
      - { type: adapter.invoke, adapter: coffer, operation: can-open, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, player: CivMember }, as: personal-member }
      - { type: adapter.invoke, adapter: coffer, operation: inspect-pair, args: { relativeTo: CivHead, x: -6, y: 0, z: 0 }, as: durable-personal-target }
      - { type: adapter.invoke, adapter: coffer, operation: bind, args: { relativeTo: CivHead, x: -6, y: 0, z: 0, type: private, ownerPlayer: CivMember }, as: durable-personal-bind }
      - { type: adapter.invoke, adapter: coffer, operation: set-trusted, args: { relativeTo: CivHead, x: -6, y: 0, z: 0, players: [CivHead] }, as: durable-personal-trust }
      - { type: adapter.invoke, adapter: coffer, operation: can-open, args: { relativeTo: CivHead, x: -6, y: 0, z: 0, player: CivMember }, as: durable-personal-owner }
      - { type: adapter.invoke, adapter: coffer, operation: can-open, args: { relativeTo: CivHead, x: -6, y: 0, z: 0, player: CivHead }, as: durable-personal-trusted }
    assertions:
      - { type: value.json, value: personal-bind, jsonPath: lock.ownershipMode, expected: personal }
      - { type: value.json, value: personal-head, jsonPath: allowed, expected: true }
      - { type: value.json, value: personal-member, jsonPath: allowed, expected: false }
      - { type: value.json, value: durable-personal-target, jsonPath: pair.0.block, expected: "minecraft:chest" }
      - { type: value.json, value: durable-personal-bind, jsonPath: lock.ownershipMode, expected: personal }
      - { type: value.json, value: durable-personal-owner, jsonPath: allowed, expected: true }
      - { type: value.json, value: durable-personal-trusted, jsonPath: allowed, expected: true }

  - id: premises
    name: Restrict premises management to the family head and opt ordinary members into access
    actions:
      - { type: adapter.invoke, adapter: coffer, operation: set-policy, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, ownershipMode: premises, accessScopes: [] }, as: premises-private }
      - { type: adapter.invoke, adapter: coffer, operation: can-open, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, player: CivHead }, as: premises-head }
      - { type: adapter.invoke, adapter: coffer, operation: can-open, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, player: CivMember }, as: premises-member }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CivHead run tp CivMember ~1 ~ ~-2 0 0" } }
      - { type: client.command, client: member, command: "coffer flag hoppers off" }
      - type: wait.until
        assertion: { type: client.event, client: member, event: message, pattern: "Armed flag hoppers" }
      - { type: client.break_block, client: member, relativeTo: CivHead, x: 1, y: 0, z: 0 }
      - type: wait.until
        assertion: { type: client.event, client: member, event: message, pattern: "owner|manage|administrator|denied" }
      - { type: adapter.invoke, adapter: coffer, operation: set-policy, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, ownershipMode: premises, accessScopes: [kinship_members] }, as: kinship-opt-in }
      - { type: adapter.invoke, adapter: coffer, operation: set-flag, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, flag: hoppers, value: false }, as: continuity-flag }
      - { type: adapter.invoke, adapter: coffer, operation: can-open, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, player: CivMember }, as: member-opted-in }
      - { type: client.use_block, client: member, relativeTo: CivHead, x: 1, y: 0, z: 0 }
      - type: wait.until
        assertion: { type: client.window, client: member, operator: exists }
    assertions:
      - { type: value.json, value: premises-head, jsonPath: allowed, expected: true }
      - { type: value.json, value: premises-member, jsonPath: allowed, expected: false }
      - { type: value.json, value: member-opted-in, jsonPath: allowed, expected: true }
      - { type: value.json, value: kinship-opt-in, jsonPath: lock.accessScopes, operator: contains, expected: kinship_members }
      - { type: value.json, value: continuity-flag, jsonPath: lock.flagOverrides.hoppers, expected: false }

  - id: independent-scopes
    name: Keep Rooms residents and Kinship membership as independent opt-in grants
    actions:
      - { type: adapter.invoke, adapter: coffer, operation: set-policy, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, ownershipMode: premises, accessScopes: [structure_residents] } }
      - { type: adapter.invoke, adapter: coffer, operation: provider-control, args: { provider: structures, mode: resident, player: CivMember } }
      - { type: adapter.invoke, adapter: coffer, operation: provider-control, args: { provider: principals, mode: stale } }
      - { type: adapter.invoke, adapter: coffer, operation: can-open, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, player: CivMember }, as: resident-with-stale-kinship }
      - { type: adapter.invoke, adapter: coffer, operation: provider-control, args: { provider: structures, mode: original } }
      - { type: adapter.invoke, adapter: coffer, operation: provider-control, args: { provider: principals, mode: original } }
      - { type: adapter.invoke, adapter: coffer, operation: can-open, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, player: CivMember }, as: kinship-member-without-residency }
      - { type: adapter.invoke, adapter: coffer, operation: set-policy, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, ownershipMode: premises, accessScopes: [kinship_members] } }
      - { type: adapter.invoke, adapter: coffer, operation: can-open, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, player: CivMember }, as: kinship-member-opted-in }
    assertions:
      - { type: value.json, value: resident-with-stale-kinship, jsonPath: allowed, expected: true }
      - { type: value.json, value: kinship-member-without-residency, jsonPath: allowed, expected: false }
      - { type: value.json, value: kinship-member-opted-in, jsonPath: allowed, expected: true }

  - id: provider-failures
    name: Fail group-derived access closed while retaining personal ownership and local trust
    actions:
      - { type: adapter.invoke, adapter: coffer, operation: set-policy, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, ownershipMode: premises, accessScopes: [structure_residents, kinship_members] } }
      - { type: adapter.invoke, adapter: coffer, operation: provider-control, args: { provider: principals, mode: missing } }
      - { type: adapter.invoke, adapter: coffer, operation: can-open, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, player: CivMember }, as: missing-group }
      - { type: adapter.invoke, adapter: coffer, operation: can-open, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, player: CivHead }, as: missing-binding-owner }
      - { type: adapter.invoke, adapter: coffer, operation: can-open, args: { relativeTo: CivHead, x: -6, y: 0, z: 0, player: CivMember }, as: missing-personal-owner }
      - { type: adapter.invoke, adapter: coffer, operation: provider-control, args: { provider: principals, mode: malformed } }
      - { type: adapter.invoke, adapter: coffer, operation: can-open, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, player: CivMember }, as: malformed-group }
      - { type: adapter.invoke, adapter: coffer, operation: can-open, args: { relativeTo: CivHead, x: -6, y: 0, z: 0, player: CivHead }, as: malformed-local-trust }
      - { type: adapter.invoke, adapter: coffer, operation: provider-control, args: { provider: principals, mode: throwing } }
      - { type: adapter.invoke, adapter: coffer, operation: set-trusted, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, players: [CivMember] } }
      - { type: adapter.invoke, adapter: coffer, operation: can-open, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, player: CivMember }, as: throwing-local-trust }
      - { type: adapter.invoke, adapter: coffer, operation: set-trusted, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, players: [] } }
      - { type: adapter.invoke, adapter: coffer, operation: can-open, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, player: CivMember }, as: throwing-group }
      - { type: adapter.invoke, adapter: coffer, operation: provider-control, args: { provider: principals, mode: stale } }
      - { type: adapter.invoke, adapter: coffer, operation: can-open, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, player: CivMember }, as: stale-group }
      - { type: adapter.invoke, adapter: coffer, operation: can-open, args: { relativeTo: CivHead, x: -6, y: 0, z: 0, player: CivMember }, as: stale-personal-owner }
      - { type: adapter.invoke, adapter: coffer, operation: provider-control, args: { provider: principals, mode: original } }
    assertions:
      - { type: value.json, value: missing-group, jsonPath: allowed, expected: false }
      - { type: value.json, value: missing-binding-owner, jsonPath: allowed, expected: true }
      - { type: value.json, value: missing-personal-owner, jsonPath: allowed, expected: true }
      - { type: value.json, value: malformed-group, jsonPath: allowed, expected: false }
      - { type: value.json, value: malformed-local-trust, jsonPath: allowed, expected: true }
      - { type: value.json, value: throwing-local-trust, jsonPath: allowed, expected: true }
      - { type: value.json, value: throwing-group, jsonPath: allowed, expected: false }
      - { type: value.json, value: stale-group, jsonPath: allowed, expected: false }
      - { type: value.json, value: stale-personal-owner, jsonPath: allowed, expected: true }

  - id: selective-transfer
    name: Move only premises ownership when a reviewed structure transfer occurs
    actions:
      - { type: adapter.invoke, adapter: coffer, operation: inspect-registry, args: { relativeTo: CivHead, x: -6, y: 0, z: 0 }, as: transfer-personal-before }
      - { type: adapter.invoke, adapter: coffer, operation: inspect-registry, args: { relativeTo: CivHead, x: 1, y: 0, z: 0 }, as: transfer-premises-before }
      - { type: value.extract, value: transfer-personal-before, jsonPath: owner, as: member-player-principal }
      - { type: value.extract, value: transfer-personal-before, jsonPath: bindingOwner, as: personal-binding-owner }
      - { type: value.extract, value: transfer-premises-before, jsonPath: bindingOwner, as: premises-binding-owner }
      - { type: adapter.invoke, adapter: coffer, operation: provider-control, args: { provider: structures, mode: transferred, player: CivMember } }
      - { type: adapter.invoke, adapter: coffer, operation: inspect-registry, args: { relativeTo: CivHead, x: -6, y: 0, z: 0 }, as: transfer-personal-after }
      - { type: adapter.invoke, adapter: coffer, operation: inspect-registry, args: { relativeTo: CivHead, x: 1, y: 0, z: 0 }, as: transfer-premises-after }
      - { type: adapter.invoke, adapter: coffer, operation: provider-control, args: { provider: structures, mode: original } }
      - { type: adapter.invoke, adapter: coffer, operation: set-policy, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, ownershipMode: premises, accessScopes: [kinship_members] } }
      - { type: adapter.invoke, adapter: coffer, operation: set-flag, args: { relativeTo: CivHead, x: 1, y: 0, z: 0, flag: hoppers, value: false } }
    assertions:
      - { type: value.json, value: transfer-personal-after, jsonPath: ownershipMode, expected: personal }
      - { type: value.json, value: transfer-personal-after, jsonPath: owner, expected: "${member-player-principal}" }
      - { type: value.json, value: transfer-personal-after, jsonPath: bindingOwner, expected: "${personal-binding-owner}" }
      - { type: value.json, value: transfer-premises-after, jsonPath: ownershipMode, expected: premises }
      - { type: value.json, value: transfer-premises-after, jsonPath: owner, expected: "${member-player-principal}" }
