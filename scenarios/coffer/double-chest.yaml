schemaVersion: 1
id: coffer/double-chest
title: Coffer double-chest merge and lifecycle security
issues: [20]
tags: [coffer, double-chest, placement, security]
artifacts:
  consumer: { required: true, description: Packaged coffer-fabric-server jar }
clients:
  - { name: owner, username: ChestOwner }
  - { name: stranger, username: ChestStranger }
server:
  memoryMb: 1536
  reuseWorldOnRestart: true
steps:
  - id: pair
    name: Form double chests in both directions and synchronize lock state across both halves
    timeoutSeconds: 260
    actions:
      - { type: server.start }
      - { type: client.command, client: owner, command: "coffer harness double both-directions" }
    assertions:
      - { type: bridge.json, path: "/v1/block-entity?x=0&y=80&z=0", jsonPath: snbt, operator: contains, expected: ChestOwner }
      - { type: bridge.json, path: "/v1/block-entity?x=1&y=80&z=0", jsonPath: snbt, operator: contains, expected: ChestOwner }
  - id: merge
    name: Bind unbound merge partner and refuse both stranger merge directions without consume/dupe
    actions:
      - { type: snapshot.capture, name: stranger-before, client: stranger }
      - { type: client.command, client: stranger, command: "coffer harness merge both-directions" }
      - { type: snapshot.capture, name: stranger-after, client: stranger }
    assertions:
      - { type: snapshot.equals, left: stranger-before, right: stranger-after, path: inventory }
  - id: synchronize
    name: Synchronize trust, lock, key, flags, transfer, break/re-form, trapped, and copper variants
    actions:
      - { type: client.command, client: owner, command: "coffer harness double lifecycle-all" }
      - { type: wait.ticks, ticks: 40 }
    assertions:
      - { type: log.absent, pattern: "double chest.*(?:diverg|desync)|duplicate item|item loss" }
  - id: restart
    name: Preserve equivalent state after restart
    timeoutSeconds: 260
    actions: [{ type: server.restart, reconnect: true }]
    assertions:
      - { type: log.absent, pattern: "double chest.*(?:state loss|desync)" }
  - id: stop
    name: Clean shutdown
    always: true
    actions: [{ type: server.stop }]
