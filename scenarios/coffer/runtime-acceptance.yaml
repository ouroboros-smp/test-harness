schemaVersion: 1
id: coffer/runtime-acceptance
title: Coffer Fabric placement, access policy, double-chest, API, and persistence acceptance
description: Uses two real protocol clients for player-facing behavior and the published Coffer API through a harness-only adapter for deterministic inspection and offline-player trust setup.
issues: [18, 19, 20, 21, 22]
tags: [fabric, minecraft-26.2, coffer, multi-client, persistence, public-api]
artifacts:
  consumer: { required: true, description: Packaged coffer-fabric-server jar }
  coffer_adapter: { required: true, description: Harness-only CofferApi adapter jar }
clients:
  - { name: owner, username: CofferOwner, gameMode: creative }
  - { name: stranger, username: CofferStranger }
server:
  memoryMb: 1792
  startupTimeoutSeconds: 300
  reuseWorldOnRestart: true
steps:
  - id: start
    name: Start the packaged Fabric mod and two real protocol clients
    actions:
      - { type: server.start }
      - { type: client.look, client: owner, yaw: 0, pitch: 0 }
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CofferOwner run fill ~ ~-1 ~3 ~1 ~-1 ~3 minecraft:stone" } }
      - { type: wait.duration, seconds: 3 }
      - { type: console.command, command: "give CofferOwner minecraft:chest 2" }
      - { type: wait.duration, seconds: 2 }
      - { type: client.select_hotbar, client: owner, slot: 0 }
      - { type: wait.duration, seconds: 1 }
      - { type: snapshot.capture, name: owner-equipped, client: owner }
    assertions:
      - { type: log.present, pattern: "Coffer.*(?:initialized|enabled|loaded|started)", count: 1, operator: gte }
      - { type: log.absent, pattern: "Failed to (?:initialize|load) Coffer" }

  - id: place_double
    name: Auto-bind player-placed chests and synchronize both double-chest halves
    timeoutSeconds: 90
    actions:
      - { type: client.place_block, client: owner, relative: true, x: 0, y: -1, z: 3 }
      - { type: wait.duration, seconds: 1 }
      - { type: client.place_block, client: owner, relative: true, x: 1, y: -1, z: 3 }
      - { type: wait.duration, seconds: 2 }
      - { type: adapter.invoke, adapter: coffer, operation: inspect, args: { relativeTo: CofferOwner, x: 0, y: 0, z: 3 }, as: primary-lock }
      - { type: adapter.invoke, adapter: coffer, operation: inspect, args: { relativeTo: CofferOwner, x: 1, y: 0, z: 3 }, as: partner-lock }
    assertions:
      - { type: client.event, client: owner, event: message, pattern: "Locked this (?:container as private|double chest)" }
      - { type: value.json, value: primary-lock, jsonPath: type, expected: private }
      - { type: value.json, value: partner-lock, jsonPath: type, expected: private }
      - { type: value.json, value: primary-lock, jsonPath: owner, operator: equals, expected: "49cb58c5-2da1-3c9c-8915-7583239710e7" }
      - { type: value.json, value: partner-lock, jsonPath: owner, operator: equals, expected: "49cb58c5-2da1-3c9c-8915-7583239710e7" }

  - id: private_access
    name: Deny an untrusted player without opening the container
    actions:
      - { type: bridge.request, method: POST, path: /v1/command, body: { command: "execute at CofferOwner run tp CofferStranger ~1 ~ ~" } }
      - { type: wait.duration, seconds: 1 }
      - { type: client.look, client: stranger, yaw: 0, pitch: 0 }
      - { type: adapter.invoke, adapter: coffer, operation: can-open, args: { relativeTo: CofferOwner, x: 0, y: 0, z: 3, player: CofferStranger }, as: denied-policy }
      - { type: client.use_block, client: stranger, relative: true, x: -1, y: 0, z: 3 }
      - { type: wait.duration, seconds: 1 }
    assertions:
      - { type: value.json, value: denied-policy, jsonPath: allowed, expected: false }
      - { type: client.event, client: stranger, event: message, pattern: "belongs to CofferOwner|locked|denied" }
      - { type: client.event, client: stranger, event: window_open, count: 0, operator: equals }

  - id: public_api
    name: Exercise published CofferApi trust and automation flag mutations
    actions:
      - { type: adapter.invoke, adapter: coffer, operation: set-trusted, args: { relativeTo: CofferOwner, x: 0, y: 0, z: 3, players: [CofferStranger] }, as: trusted-lock }
      - { type: adapter.invoke, adapter: coffer, operation: set-flag, args: { relativeTo: CofferOwner, x: 0, y: 0, z: 3, flag: hoppers, value: false }, as: hopper-policy }
      - { type: adapter.invoke, adapter: coffer, operation: set-flag, args: { relativeTo: CofferOwner, x: 0, y: 0, z: 3, flag: copper_golems, value: false }, as: golem-policy }
      - { type: adapter.invoke, adapter: coffer, operation: can-open, args: { relativeTo: CofferOwner, x: 0, y: 0, z: 3, player: CofferStranger }, as: trusted-policy }
      - { type: client.use_block, client: stranger, relative: true, x: -1, y: 0, z: 3 }
      - { type: wait.duration, seconds: 1 }
    assertions:
      - { type: value.json, value: trusted-lock, jsonPath: updated, expected: true }
      - { type: value.json, value: hopper-policy, jsonPath: lock.flagOverrides.hoppers, expected: false }
      - { type: value.json, value: golem-policy, jsonPath: lock.flagOverrides.copper_golems, expected: false }
      - { type: value.json, value: trusted-policy, jsonPath: allowed, expected: true }
      - { type: client.event, client: stranger, event: window_open, count: 1, operator: gte }

  - id: commands
    name: Exercise supported owner command targeting and public access mode
    actions:
      - { type: client.disconnect, client: stranger }
      - { type: client.command, client: owner, command: "coffer info" }
      - { type: client.break_block, client: owner, relative: true, x: 0, y: 0, z: 3 }
      - { type: wait.duration, seconds: 1 }
      - { type: client.command, client: owner, command: "coffer lock public" }
      - { type: client.break_block, client: owner, relative: true, x: 0, y: 0, z: 3 }
      - { type: wait.duration, seconds: 2 }
      - { type: adapter.invoke, adapter: coffer, operation: inspect, args: { relativeTo: CofferOwner, x: 0, y: 0, z: 3 }, as: public-lock }
    assertions:
      - { type: client.event, client: owner, event: message, pattern: "Type: private|Owner: CofferOwner" }
      - { type: client.event, client: owner, event: message, pattern: "public" }
      - { type: value.json, value: public-lock, jsonPath: type, expected: public }

  - id: restart
    name: Preserve owner, trust, lock mode, and automation overrides across restart
    timeoutSeconds: 360
    actions:
      - { type: server.restart, reconnect: true }
      - { type: wait.duration, seconds: 3 }
      - { type: adapter.invoke, adapter: coffer, operation: inspect, args: { relativeTo: CofferOwner, x: 0, y: 0, z: 3 }, as: restarted-lock }
    assertions:
      - { type: value.json, value: restarted-lock, jsonPath: type, expected: public }
      - { type: value.json, value: restarted-lock, jsonPath: trusted, operator: contains, expected: "647de6bd-93ac-391f-9c98-9d0da309ec64" }
      - { type: value.json, value: restarted-lock, jsonPath: flagOverrides.hoppers, expected: false }
      - { type: value.json, value: restarted-lock, jsonPath: flagOverrides.copper_golems, expected: false }
      - { type: log.absent, pattern: "duplicate callback|Failed to load Coffer|corrupt" }

  - id: stop
    name: Stop after success or failure
    always: true
    actions:
      - { type: server.stop }
