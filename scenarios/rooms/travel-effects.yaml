schemaVersion: 1
id: rooms/travel-effects
title: Rooms cross-chunk travel effect reconciliation
issues: [9]
tags: [rooms, travel, effects, lifecycle]
artifacts:
  consumer: { required: true, description: Packaged Rooms Fabric 26.2 server jar }
clients:
  - { name: traveler, username: RoomsTraveler }
server: { memoryMb: 1536 }
steps:
  - id: start
    name: Boot and create typed rooms in distinct chunks with different effects
    timeoutSeconds: 260
    actions:
      - { type: server.start }
      - { type: client.command, client: traveler, command: "rooms harness fixtures travel" }
  - id: cross_chunk
    name: Clear room A ambient, begin one linger, and coexist with room B ambient
    actions:
      - { type: client.command, client: traveler, command: "rooms harness enter A" }
      - { type: wait.ticks, ticks: 40 }
      - { type: client.command, client: traveler, command: "rooms harness enter B" }
      - { type: wait.ticks, ticks: 2 }
    assertions:
      - { type: log.absent, pattern: "duplicate effect|infinite ambient|clobber" }
  - id: relocation_paths
    name: Reconcile portal, world change, death, respawn, and vehicle travel
    actions:
      - { type: client.command, client: traveler, command: "rooms harness travel all" }
      - { type: wait.ticks, ticks: 4 }
    assertions:
      - { type: log.absent, pattern: "stale ambient|reconciliation timeout|wrong thread" }
  - id: reconnect
    name: Retire queued relocation on quit and create exactly one warm-up after relog
    actions:
      - { type: client.disconnect, client: traveler }
      - { type: wait.ticks, ticks: 2 }
      - { type: client.reconnect, client: traveler }
      - { type: client.command, client: traveler, command: "rooms harness enter A" }
    assertions:
      - { type: log.rate, pattern: "warm.?up.*RoomsTraveler", maxPerMinute: 1, windowSeconds: 60 }
  - id: stop
    name: Clean shutdown
    always: true
    actions: [{ type: server.stop }]
