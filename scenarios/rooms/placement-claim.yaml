schemaVersion: 1
id: rooms/placement-claim
title: Rooms placement attribution and front-door claim ceremony
issues: [16]
tags: [rooms, placement, ownership, ceremony]
artifacts:
  consumer: { required: true, description: Packaged Rooms Fabric 26.2 server jar }
clients:
  - { name: builder, username: ClaimBuilder }
  - { name: squatter, username: ClaimSquatter }
server:
  memoryMb: 1536
  reuseWorldOnRestart: true
steps:
  - id: construct
    name: Construct with real placements while the builder exceeds shell/share thresholds
    timeoutSeconds: 260
    actions:
      - { type: server.start }
      - { type: client.command, client: builder, command: "rooms harness build attributed" }
      - { type: client.command, client: squatter, command: "rooms harness replace-door" }
  - id: discover
    name: Attribute one adjacent-room structure to the builder despite squatter door replacement
    actions:
      - { type: client.command, client: builder, command: "rooms rescan" }
      - { type: wait.duration, seconds: 5 }
    assertions:
      - { type: log.present, pattern: "owner.*ClaimBuilder", count: 1, operator: gte }
      - { type: log.absent, pattern: "owner.*ClaimSquatter" }
  - id: ceremony
    name: Open and complete the main-door ceremony without later ownership mutation
    actions:
      - { type: client.command, client: builder, command: "rooms harness claim-main-door" }
      - { type: client.command, client: squatter, command: "rooms harness use-and-sleep" }
    assertions:
      - { type: client.event, client: builder, event: window_open, count: 1, operator: gte }
      - { type: log.absent, pattern: "owner.*changed.*ClaimSquatter" }
  - id: ambiguous
    name: Leave equal-share and legacy pre-log fixtures unclaimed with claim UI
    actions:
      - { type: client.command, client: builder, command: "rooms harness fixtures ambiguous" }
    assertions:
      - { type: log.present, pattern: "unclaimed|claim UI", count: 1, operator: gte }
  - id: restart
    name: Preserve exact owner and structure identity across restart
    timeoutSeconds: 260
    actions:
      - { type: snapshot.capture, name: claim-before, path: /v1/entities }
      - { type: server.restart, reconnect: true }
      - { type: snapshot.capture, name: claim-after, path: /v1/entities }
    assertions:
      - { type: snapshot.equals, left: claim-before, right: claim-after }
  - id: stop
    name: Clean shutdown
    always: true
    actions: [{ type: server.stop }]
