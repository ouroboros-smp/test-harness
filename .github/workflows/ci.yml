name: CI

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: [self-hosted, crucible-pc]
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Check out Coffer adapter contract dependency
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: ouroboros-smp/coffer
          path: consumer
          token: ${{ secrets.OUROBOROS_CI_READ_TOKEN }}
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
          cache: npm
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "25"
      - name: Install pinned Rust nightly
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # v1
        with:
          toolchain: nightly-2026-07-13
          components: rustfmt, clippy
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm test
      - run: npm run fmt:client
      - run: npm run lint:client
      - run: npm run test:client
      - run: npm run build:client
      - run: npm run test:bridge
      - run: npm run test:parcels-adapter
      - run: npm run test:patrol-adapter
      - name: Build Coffer adapter contract dependency
        working-directory: consumer
        run: ./gradlew :core:jar :fabric:serverJar --no-daemon
      - name: Run Coffer adapter Java tests
        run: >-
          ./gradlew
          -Pcoffer_jar=consumer/fabric/build/libs/coffer-fabric-server-0.1.5.jar
          -Pcoffer_core_jar=consumer/core/build/libs/core-0.1.5.jar
          :adapters:coffer:test --no-daemon
      - run: npm run validate
      - run: node dist/cli.js doctor

  live-smoke:
    needs: verify
    runs-on: [self-hosted, crucible-pc]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
          cache: npm
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "25"
      - name: Install pinned Rust nightly
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # v1
        with:
          toolchain: nightly-2026-07-13
          components: rustfmt, clippy
      - run: npm ci
      - run: npm run build
      - run: npm run build:client
      - run: npm run test:bridge
      - name: Execute live Fabric 26.2 harness smoke
        run: node dist/cli.js smoke --output artifacts/live-smoke
      - if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: live-fabric-smoke
          path: artifacts/live-smoke
          if-no-files-found: error

  parcels-offline-protection:
    needs: verify
    runs-on: [self-hosted, crucible-pc]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Check out exact Parcels review head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: ouroboros-smp/parcels
          ref: a1b9b3e411beaf0e968ad94545bceb25ad29840e
          path: consumer
          token: ${{ secrets.OUROBOROS_CI_READ_TOKEN }}
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
          cache: npm
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "25"
      - name: Install pinned Rust nightly
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # v1
        with:
          toolchain: nightly-2026-07-13
          components: rustfmt, clippy
      - run: npm ci
      - name: Build the exact packaged Parcels jar
        working-directory: consumer
        run: ./gradlew :core:clean :fabric:clean :core:build :fabric:build --no-daemon
      - run: npm run build
      - run: npm run build:client
      - run: npm run test:bridge
      - run: npm run test:parcels-adapter
      - name: Record exact source and artifact provenance
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/parcels-offline-protection | Out-Null
          $expected = "a1b9b3e411beaf0e968ad94545bceb25ad29840e"
          $actual = (git -C consumer rev-parse HEAD).Trim()
          if ($actual -ne $expected) { throw "Parcels checkout drift: expected $expected, got $actual" }
          $provenance = [ordered]@{
            parcelsCommit = $actual
            parcelsJarSha256 = (Get-FileHash consumer/fabric/build/libs/fabric-0.1.0.jar -Algorithm SHA256).Hash.ToLowerInvariant()
            adapterJarSha256 = (Get-FileHash adapters/parcels/build/libs/ouro-harness-parcels-adapter-1.0.0.jar -Algorithm SHA256).Hash.ToLowerInvariant()
          }
          $provenance | ConvertTo-Json | Set-Content artifacts/parcels-offline-protection/provenance.json
      - name: Execute released-jar Parcels offline-protection acceptance
        run: >-
          node dist/cli.js run parcels/offline-protection
          --artifact consumer=consumer/fabric/build/libs/fabric-0.1.0.jar
          --artifact parcels_adapter=adapters/parcels/build/libs/ouro-harness-parcels-adapter-1.0.0.jar
          --output artifacts/parcels-offline-protection
      - if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: parcels-offline-protection
          path: artifacts/parcels-offline-protection
          if-no-files-found: error
