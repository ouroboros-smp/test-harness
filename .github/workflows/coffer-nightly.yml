name: Coffer packaged acceptance

on:
  schedule:
    - cron: "41 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-once:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out test harness
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Check out Coffer
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: ouroboros-smp/coffer
          path: consumer
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with: { node-version: "24", cache: npm }
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with: { distribution: temurin, java-version: "25", cache: gradle }
      - name: Install pinned Rust nightly
        run: rustup toolchain install nightly-2026-07-13 --profile minimal
      - run: npm ci
      - run: npm run build
      - run: npm run build:client
      - run: npm run test:bridge
      - name: Build and verify Coffer once
        working-directory: consumer
        run: xvfb-run --auto-servernum ./gradlew :core:build :fabric:build prepareReleaseArtifacts --no-daemon
      - name: Build the harness-only Coffer adapter
        run: >-
          ./gradlew
          -Pcoffer_jar=consumer/fabric/build/libs/coffer-fabric-server-1.3.0.jar
          -Pcoffer_core_jar=consumer/core/build/libs/core-1.3.0.jar
          :adapters:coffer:build --no-daemon
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coffer-nightly-build
          path: |
            consumer/fabric/build/libs/coffer-fabric-server-1.3.0.jar
            adapters/coffer/build/libs/ouro-harness-coffer-adapter-1.0.0.jar
            bridge/build/libs/ouro-harness-bridge-1.0.0.jar
            client/target/debug/ouro-harness-client
          if-no-files-found: error

  wildanimalbalancer-compatibility:
    needs: build-once
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Check out WildAnimalBalancer
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: ouroboros-smp/WildAnimalBalancer
          path: wildanimalbalancer
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with: { node-version: "24", cache: npm }
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with: { distribution: temurin, java-version: "25", cache: gradle }
      - run: npm ci
      - run: npm run build
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coffer-nightly-build
          path: .
      - run: chmod +x client/target/debug/ouro-harness-client
      - name: Build WildAnimalBalancer
        working-directory: wildanimalbalancer
        run: ./gradlew :core:build :fabric:build --no-daemon
      - name: Run packaged collision and behavior scenario
        run: >-
          node dist/cli.js run coffer/wildanimalbalancer-compatibility
          --artifact consumer=consumer/fabric/build/libs/coffer-fabric-server-1.3.0.jar
          --artifact coffer_adapter=adapters/coffer/build/libs/ouro-harness-coffer-adapter-1.0.0.jar
          --artifact wildanimalbalancer=wildanimalbalancer/fabric/build/libs/WildAnimalBalancer-fabric-2.0.2.jar
          --output artifacts/coffer-wildanimalbalancer
      - if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coffer-wildanimalbalancer-evidence
          path: artifacts/coffer-wildanimalbalancer
          if-no-files-found: error

  civilization-stack:
    if: ${{ vars.COFFER_CIVILIZATION_STACK_ENABLED == 'true' }}
    needs: build-once
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Check out Rooms
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: ouroboros-smp/rooms-and-structures
          path: rooms
      - name: Check out Kinship
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: ouroboros-smp/kinship
          path: kinship
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with: { node-version: "24", cache: npm }
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with: { distribution: temurin, java-version: "25", cache: gradle }
      - run: npm ci
      - run: npm run build
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coffer-nightly-build
          path: .
      - run: chmod +x client/target/debug/ouro-harness-client
      - name: Build Rooms and Kinship
        run: |
          ./rooms/gradlew -p rooms :platform:fabric:build --no-daemon
          ./kinship/gradlew -p kinship :minecraft-core:build :minecraft-fabric:build --no-daemon
      - name: Run packaged civilization continuity scenario
        run: >-
          node dist/cli.js run coffer/civilization-stack
          --artifact consumer=consumer/fabric/build/libs/coffer-fabric-server-1.3.0.jar
          --artifact coffer_adapter=adapters/coffer/build/libs/ouro-harness-coffer-adapter-1.0.0.jar
          --artifact rooms=rooms/platform/fabric/build/libs/rooms-fabric-0.3.1.jar
          --artifact kinship=kinship/minecraft-fabric/build/libs/kinship-fabric-0.4.0.jar
          --output artifacts/coffer-civilization-stack
      - if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coffer-civilization-stack-evidence
          path: artifacts/coffer-civilization-stack
          if-no-files-found: error

  focused-scenarios:
    needs: build-once
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - access-persistence
          - double-chest-lifecycle
          - automation-extraction
          - api-protection-packaging
          - permissions-luckperms
          - metrics-exporter
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with: { node-version: "24", cache: npm }
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with: { distribution: temurin, java-version: "25" }
      - run: npm ci
      - run: npm run build
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coffer-nightly-build
          path: .
      - run: chmod +x client/target/debug/ouro-harness-client
      - name: Run focused packaged scenario
        run: >-
          node dist/cli.js run coffer/${{ matrix.scenario }}
          --artifact consumer=consumer/fabric/build/libs/coffer-fabric-server-1.3.0.jar
          --artifact coffer_adapter=adapters/coffer/build/libs/ouro-harness-coffer-adapter-1.0.0.jar
          --output artifacts/coffer-${{ matrix.scenario }}
      - if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coffer-${{ matrix.scenario }}-evidence
          path: artifacts/coffer-${{ matrix.scenario }}
          if-no-files-found: error
