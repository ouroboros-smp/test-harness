name: Nightly bounded soak

on:
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  harness-soak:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with: { node-version: "24", cache: npm }
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with: { distribution: temurin, java-version: "25", cache: gradle }
      - name: Install pinned Rust nightly
        run: rustup toolchain install nightly-2026-07-13 --profile minimal --component rustfmt --component clippy
      - run: npm ci
      - run: npm run build
      - run: npm run build:client
      - run: npm run test:bridge
      - run: node dist/cli.js run harness/stress-smoke --output artifacts/stress-smoke
      - if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: nightly-stress-smoke
          path: artifacts/stress-smoke
          if-no-files-found: error
