schemaVersion: 1
title: Ouroboros SMP production Fabric stack
platform: fabric
minecraft: "26.2"
loader: "0.19.3"
environmentDeltas:
  - Production clients connect through FabricProxy-Lite; harness clients connect directly.
  - ViaFabric and ViaBackwards permit older vanilla protocols; the harness client remains pinned to protocol 776.
  - External Discord, proxy, voice-chat UDP, and production data services are not reproduced by the baseline boot scenario.

mods:
  # First-party release artifacts. These exact pins are the deployment-to-portfolio drift contract.
  - id: coffer
    title: Coffer
    modId: coffer
    owner: first-party
    bucket: first-party
    enabled: true
    version: 1.3.0
    file: coffer-fabric-server-1.3.0.jar
    repository: https://github.com/ouroboros-smp/coffer
    portfolioTarget: coffer
    obligations: [targeted packaged-jar acceptance, full-manifest boot, restart]
    touchpoints: [rooms storage durability and container ownership]

  - id: keepgear
    title: KeepGear
    modId: keepgear
    owner: first-party
    bucket: first-party
    enabled: true
    version: 2.0.1
    file: keepgear-2.0.1-fabric.jar
    repository: https://github.com/ouroboros-smp/KeepGear
    portfolioTarget: keepgear
    obligations: [targeted packaged-jar acceptance, full-manifest boot, restart]

  - id: kinship
    title: Kinship
    modId: kinship
    owner: first-party
