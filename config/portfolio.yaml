schemaVersion: 1
title: Ouroboros SMP complete Fabric mod portfolio
variables:
  cofferRepository: ../coffer
  keepgearRepository: ../KeepGear/fabric
  kinshipRepository: ../kinship
  blindfoldRepository: ../LocalBlindness
  ouroveilRepository: ../world-border-veil
  mehenRepository: ../mehen
  ourometricsRepository: ../ouro-metrics
  patrolRepository: ../Patrol
  roomsRepository: ../rooms-and-structures
  watershedRepository: ../watershed
  wildanimalbalancerRepository: ../WildAnimalBalancer

targets:
  - id: test-harness
    title: Test harness self-tests
    repository: .
    testedVersion: 1.0.0
    build:
      - name: Node unit and contract tests
        command: ["${platform.npm}", test]
        timeoutMinutes: 10
      - name: Rust protocol-client tests
        command: ["${platform.npm}", run, test:client]
        timeoutMinutes: 15
      - name: Fabric bridge
        command: ["${platform.gradleWrapper}", :bridge:build]
        java: 25
        timeoutMinutes: 15
    scenarios:
      - harness/action-contract
      - harness/live-smoke
      - harness/stress-smoke

  - id: coffer
    title: Coffer
    repository: "${cofferRepository}"
    testedVersion: 1.3.0
    build:
      - name: Coffer Fabric clean build and tests
        command: ["${platform.gradleWrapper}", :core:clean, :fabric:clean, :core:build, :fabric:build]
        java: 25
      - name: Coffer harness adapter
        base: harness
        command:
          - "${platform.gradleWrapper}"
          - "-Pcoffer_jar=${cofferRepository}/fabric/build/libs/coffer-fabric-server-1.3.0.jar"
          - "-Pcoffer_core_jar=${cofferRepository}/core/build/libs/core-1.3.0.jar"
          - :adapters:coffer:clean
          - :adapters:coffer:build
        java: 25
        timeoutMinutes: 15
    artifacts:
      consumer: { path: fabric/build/libs/coffer-fabric-server-1.3.0.jar }
      coffer_adapter: { path: adapters/coffer/build/libs/ouro-harness-coffer-adapter-1.0.0.jar, base: harness }
    scenarios: [coffer/runtime-acceptance]

  - id: keepgear
    title: KeepGear
    repository: "${keepgearRepository}"
    testedVersion: 2.0.1
    build:
      - name: KeepGear clean build and tests
        command: ["${platform.gradleWrapper}", clean, build]
        java: 25
    artifacts:
      consumer: { path: build/libs/keepgear-2.0.1-fabric.jar }
    scenarios: [keepgear/acceptance]

  - id: kinship
    title: Kinship
    repository: "${kinshipRepository}"
    testedVersion: 0.4.0
    build:
      - name: Kinship Fabric clean build and tests
        command: ["${platform.gradleWrapper}", :minecraft-core:clean, :minecraft-fabric:clean, :minecraft-core:build, :minecraft-fabric:build]
        java: 25
    artifacts:
      consumer: { path: minecraft-fabric/build/libs/kinship-fabric-0.4.0.jar }
    scenarios:
      - kinship/functional-smoke
      - kinship/thread-lifecycle-regressions
      - kinship/stress-soak

  - id: mehen
    title: Mehen
    repository: "${mehenRepository}"
    testedVersion: 1.0.5
    build:
      - name: Mehen Fabric unit, integration, and packaging tests
        command: ["${platform.gradleWrapper}", :core:clean, :fabric:clean, :core:build, :fabric:build]
        java: 25
        environment: { DOCKER_API_VERSION: "1.44" }
        timeoutMinutes: 30
    artifacts:
      mehen: { path: fabric/build/libs/mehen-fabric-1.0.5-release.jar }
    scenarios: [mehen/governance-acceptance]

  - id: patrol
    title: Patrol
    repository: "${patrolRepository}"
    testedVersion: 1.2.1
    build:
      - name: Patrol Fabric clean build and tests
        command: ["${platform.gradleWrapper}", :core:clean, :fabric-net:clean, :fabric:clean, :fabric-client:clean, :core:build, :fabric-net:build, :fabric:build, :fabric-client:build]
        java: 25
    artifacts:
      patrol: { path: fabric/build/libs/patrol-fabric-1.2.1.jar }
    scenarios: [patrol/runtime-acceptance]

  - id: rooms
    title: Rooms and Structures
    repository: "${roomsRepository}"
    testedVersion: 0.3.1
    build:
      - name: Rooms clean build and tests
        command: ["${platform.gradleWrapper}", clean, build]
        java: 25
        timeoutMinutes: 30
    artifacts:
      consumer: { path: platform/fabric/build/libs/rooms-fabric-0.3.1.jar }
    scenarios: [rooms/runtime-acceptance]

  - id: watershed
    title: Watershed
    repository: "${watershedRepository}"
    testedVersion: 0.2.0-SNAPSHOT
    build:
      - name: Watershed Fabric clean build and tests
        command: ["${platform.gradleWrapper}", :metrics-api:clean, :core:clean, :fabric-server:clean, :fabric-client:clean, :metrics-api:build, :core:build, :fabric-server:build, :fabric-client:build]
        java: 25
    artifacts:
      watershed: { path: fabric-server/build/libs/watershed-0.2.0-SNAPSHOT.jar }
    scenarios: [watershed/spring-lifecycle]

  - id: wildanimalbalancer
    title: WildAnimalBalancer
    repository: "${wildanimalbalancerRepository}"
    testedVersion: 2.0.2
    build:
      - name: WildAnimalBalancer Fabric clean build and tests
        command: ["${platform.gradleWrapper}", :core:clean, :fabric:clean, :fabric-hud:clean, :core:build, :fabric:build, :fabric-hud:build]
        java: 25
    artifacts:
      wildanimalbalancer: { path: fabric/build/libs/WildAnimalBalancer-fabric-2.0.2.jar }
    scenarios: [wildanimalbalancer/population-acceptance]

  - id: ourometrics
    title: OuroMetrics
    repository: "${ourometricsRepository}"
    testedVersion: 0.1.0
    build:
      - name: OuroMetrics Fabric clean build and tests
        command: ["${platform.gradleWrapper}", :metrics-core:clean, :metrics-prometheus:clean, :fabric-mod:clean, :metrics-core:build, :metrics-prometheus:build, :fabric-mod:build]
        java: 21
    artifacts:
      ourometrics: { path: fabric-mod/build/libs/OuroMetrics-0.1.0.jar }
    scenarios: [ourometrics/exporter-lifecycle]

  - id: blindfold
    title: Blindfold (LocalBlindness)
    repository: "${blindfoldRepository}"
    testedVersion: 1.2.0
    build:
      - name: Blindfold clean build and tests
        command: ["${platform.gradleWrapper}", clean, build]
        java: 21
    artifacts:
      consumer: { path: build/libs/blindfold-1.2.0.jar }
    variables:
      blindfoldRepository: "${blindfoldRepository}"
    scenarios: [blindfold/client-gametest]

  - id: ouroveil
    title: OuroVeil
    repository: "${ouroveilRepository}"
    testedVersion: 1.0.2
    build:
      - name: OuroVeil server and companion clean build and tests
        command: ["${platform.gradleWrapper}", clean, build, coverageReport, --no-daemon]
        java: 25
        timeoutMinutes: 30
    artifacts:
      server: { path: build/libs/ouroveil-1.0.2.jar }
      companion: { path: companion/build/libs/ouroveil-client-1.0.2.jar }
    variables:
      ouroveilRepository: "${ouroveilRepository}"
    scenarios: [ouroveil/release-acceptance]
